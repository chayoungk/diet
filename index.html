<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
  <title>나의 다이어트 분석</title>
  <link rel="stylesheet" href="style.css">
  <script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.0/dist/chart.umd.min.js"></script>
</head>
<body>
  <div class="container">
    <header>
      <h1>❣️MY DIET</h1>
      <p class="subtitle" id="headerStatus"></p>
    </header>

    <nav class="tabs">
      <button class="tab active" onclick="switchTab('main', this)">메인</button>
      <button class="tab" onclick="switchTab('stats', this)">월간 통계</button>
      <button class="tab" onclick="switchTab('analysis', this)">음식 분석</button>
      <button class="tab" onclick="switchTab('settings', this)">설정</button>
    </nav>

    <main>
      <div id="tab-main" class="tab-content active">
        <section class="card insight-card" id="insights"></section>

        <div class="main-layout">
          <section class="card">
            <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:16px">
              <h2 style="margin:0">📅 캘린더</h2>
              <div style="display:flex;gap:8px;align-items:center">
                <button class="btn-icon" onclick="changeCalendarMonth(-1)">←</button>
                <span id="calendarMonth" style="font-size:14px;font-weight:600;min-width:90px;text-align:center"></span>
                <button class="btn-icon" onclick="changeCalendarMonth(1)">→</button>
                <button class="btn-icon" onclick="goToToday()">오늘</button>
              </div>
            </div>
            <div id="calendar"></div>
          </section>

          <section class="card">
            <div style="display:flex; justify-content:space-between; align-items:center; margin-bottom: 8px;">
              <h2 style="margin:0;">📅 <span id="selectedDateTitle"></span></h2>
              <button id="fastingToggleBtn" onclick="toggleFasting()" class="btn-fasting">🌙 단식일 지정</button>
            </div>
            
            <div class="weight-record-box">
              <div style="display:flex; justify-content:space-between; align-items:center; margin-bottom:8px;">
                <span style="font-weight:600; font-size:14px;">⚖️ 이 날의 체중</span>
                <span id="selectedDateWeightDisplay" style="font-weight:bold; color:var(--accent);">미기록</span>
              </div>
              <div style="display:flex; gap:8px;">
                <input type="number" id="selectedWeightInput" class="input" placeholder="체중 입력 (kg)" step="0.1">
                <button onclick="saveSelectedWeight()" class="btn">저장</button>
              </div>
            </div>

            <div id="selectedDateSummary" style="margin-top:16px;"></div>

            <h3 style="margin-top:24px;font-size:15px; border-top:1px solid #272b29; padding-top:16px;">🍽 식사 추가</h3>
            <div class="input-row" style="flex-direction:column">
              <div style="display:flex; gap:8px; width:100%;">
                <select id="mealType" class="input" style="flex:0.3; min-width:80px; padding:10px;">
                  <option value="아침">아침</option>
                  <option value="점심">점심</option>
                  <option value="저녁">저녁</option>
                  <option value="간식">간식</option>
                </select>
                <input type="text" id="mealName" class="input" placeholder="음식명 (예: 치킨)" style="flex:1;">
              </div>
              <div style="display:grid;grid-template-columns:1fr 1fr;gap:8px;width:100%">
                <input type="number" id="mealCal" class="input" placeholder="칼로리">
                <input type="number" id="mealCarb" class="input" placeholder="탄수화물(g)">
                <input type="number" id="mealProtein" class="input" placeholder="단백질(g)">
                <input type="number" id="mealFat" class="input" placeholder="지방(g)">
                <input type="number" id="mealSugar" class="input" placeholder="당(g)">
                <input type="number" id="mealSodium" class="input" placeholder="나트륨(mg)">
              </div>
              <button onclick="addMeal()" class="btn" style="width:100%">식사 추가</button>
            </div>
            <div id="mealList" class="list" style="margin-top: 12px; margin-bottom: 24px;"></div>

            <h3 style="font-size:15px; border-top:1px solid #272b29; padding-top:16px;">🏃‍♂️ 운동 추가</h3>
            <div style="display:flex; gap:8px; width:100%;">
              <input type="text" id="exerciseName" class="input" placeholder="운동명" style="flex:1;">
              <input type="number" id="exerciseDuration" class="input" placeholder="분" style="width:70px;">
              <button onclick="addExercise()" class="btn">기록</button>
            </div>
            <div id="exerciseList" class="list" style="margin-top: 12px;"></div>
          </section>
        </div>
      </div>

      <div id="tab-stats" class="tab-content">
        <section class="card">
          <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:16px">
            <h2 style="margin:0">📊 월간 통계 </h2>
            <select id="monthSelector" class="input" style="width:auto;min-width:130px" onchange="changeMonth()">
              <option value="">월 선택</option>
            </select>
          </div>
          <div id="monthStats"></div>
        </section>

        <section class="card">
          <h2>📈 일일 칼로리</h2>
          <div class="chart-container"><canvas id="calWeightChart"></canvas></div>
        </section>

        <section class="card">
          <h2>🥗 영양소 균형</h2>
          <div class="chart-container"><canvas id="nutrientWeightChart"></canvas></div>
        </section>
      </div>

      <div id="tab-analysis" class="tab-content">
        <section class="card">
          <h2>🔬 몸무게 스파이크 음식</h2>
          <div id="foodImpact"></div>
        </section>
        <section class="card">
          <h2>🍔 자주 먹는 음식 TOP 10</h2>
          <div id="frequentFoods"></div>
        </section>
        <section class="card">
          <h2>⚠️ 고위험 조합 패턴</h2>
          <div id="riskyCombos"></div>
        </section>
      </div>

      <div id="tab-settings" class="tab-content">
        <section class="card">
          <h2>⚙️ 내 목표 설정</h2>
          <div style="display:grid;grid-template-columns:1fr 1fr;gap:16px">
            <div><label>목표 체중 (kg)</label><input type="number" id="goalWeight" class="input" step="0.1"></div>
            <div><label>목표 칼로리 (kcal)</label><input type="number" id="goalCal" class="input"></div>
            <div><label>목표 탄수화물 (g)</label><input type="number" id="goalCarb" class="input"></div>
            <div><label>목표 단백질 (g)</label><input type="number" id="goalProtein" class="input"></div>
            <div><label>목표 지방 (g)</label><input type="number" id="goalFat" class="input"></div>
            <div><label>당 제한 (g)</label><input type="number" id="goalSugar" class="input"></div>
            <div><label>나트륨 제한 (mg)</label><input type="number" id="goalSodium" class="input"></div>
          </div>
          <button onclick="saveGoals()" class="btn" style="margin-top:16px; width:100%;">설정 저장</button>
          
          <div style="display:flex; gap:10px; margin-top:20px; padding-top:20px; border-top:1px solid #272b29;">
            <button onclick="clearCurrentMonthData()" class="btn-danger" style="flex:1; background:#ffb547; color:#000;">이번 달 삭제</button>
            <button onclick="clearData()" class="btn-danger" style="flex:1;">모두 삭제</button>
          </div>
        </section>
      </div>
    </main>
  </div>
  <script src="app.js"></script>
</body>
</html>
